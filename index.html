<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absensi Gociko</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --primary: #FF8C00; --danger: #FF4500; --light: #f4f4f4; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--primary), var(--danger)); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 85%; max-width: 400px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; }
        .header h2 { color: var(--danger); margin: 0; font-size: 1.4rem; }
        .status-box { background: #eee; padding: 10px; border-radius: 8px; font-size: 0.85rem; margin: 15px 0; color: #555; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; margin: 15px 0; }
        button { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-datang { background: var(--primary); color: white; }
        .btn-pulang { background: #FFD700; color: #333; }
        .btn-main { background: #2D2D2D; color: white; width: 100%; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; text-align: center; font-size: 1rem; }
        .camera-box { width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 15px; overflow: hidden; margin-top: 15px; border: 4px solid var(--primary); display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--danger); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="view-geo">
        <div class="header"><h2>📍 Cek Lokasi</h2></div>
        <div class="loader"></div>
        <div class="status-box" id="geo-text">Mencari GPS...</div>
    </div>

    <div id="view-login" style="display:none;">
        <div class="header">
            <h2 id="display-outlet">Outlet Gociko</h2>
            <p style="color:var(--primary); font-weight:bold;">Silakan Absen</p>
        </div>
        <div class="btn-group">
            <button id="btn-in" class="btn-datang" onclick="setType('DATANG')">DATANG</button>
            <button id="btn-out" class="btn-pulang" onclick="setType('PULANG')">PULANG</button>
        </div>
        <input type="text" id="input-nik" placeholder="Masukkan NIK" inputmode="numeric">
        <button class="btn-main" onclick="processLogin()">VALIDASI NIK</button>
        <div id="login-status" style="margin-top:10px; font-size:0.8rem; color:red;"></div>
    </div>

    <div id="view-cam" style="display:none;">
        <div class="header"><h2 id="display-nama">Verifikasi Wajah</h2></div>
        <div class="camera-box" id="box-video" style="display:block;">
            <video id="video" autoplay muted playsinline></video>
        </div>
        <div class="status-box" id="cam-status">Menyiapkan Kamera...</div>
    </div>

    <div id="view-success" style="display:none;">
        <h1 style="font-size:3rem;">✅</h1>
        <h2 id="msg-success">Berhasil!</h2>
        <button class="btn-main" onclick="location.reload()">Selesai</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxqJnXh0H2SqkvlL5JbJNRHjt9nrfSGA3_fM7xQYCObBlLoE1VTerlWdSD0iNM4D01h/exec"; // GANTI DENGAN LINK GOOGLE SCRIPT EXEC
    let currentOutlet = "";
    let attendanceType = "";
    let currentNama = "";
    let targetDescriptor = null;

    window.onload = initGeo;

    // --- ALUR 1: GPS ---
    function initGeo() {
        if (!navigator.geolocation) return alert("GPS Tidak Support");
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const res = await fetch(API_URL + "?action=checkGeo&lat=" + pos.coords.latitude + "&lon=" + pos.coords.longitude);
            const data = await res.json();
            if (data.status) {
                currentOutlet = data.outlet;
                document.getElementById('display-outlet').innerText = data.outlet;
                switchView('view-geo', 'view-login');
            } else {
                document.getElementById('geo-text').innerText = "Anda di luar radius!";
            }
        });
    }

    // --- ALUR 2: LOGIN ---
    function setType(t) {
        attendanceType = t;
        document.getElementById('btn-in').style.opacity = t === 'DATANG' ? '1' : '0.5';
        document.getElementById('btn-out').style.opacity = t === 'PULANG' ? '1' : '0.5';
    }

    async function processLogin() {
        const nik = document.getElementById('input-nik').value;
        if (!nik || !attendanceType) return alert("Pilih tipe absen & isi NIK!");
        
        document.getElementById('login-status').innerText = "Memvalidasi...";
        const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getUser", nik: nik, outlet: currentOutlet })
        });
        const data = await res.json();
        
        if (data.status) {
            currentNama = data.nama;
            targetDescriptor = new Float32Array(JSON.parse(data.descriptor));
            document.getElementById('display-nama').innerText = "Halo, " + data.nama;
            startCamera();
        } else {
            document.getElementById('login-status').innerText = data.message;
        }
    }

    // --- ALUR 3: KAMERA ---
    async function startCamera() {
        switchView('view-login', 'view-cam');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
            
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            
            document.getElementById('cam-status').innerText = "AI Aktif. Silakan Berkedip.";
            // Logika deteksi & submit absen ditaruh di sini
        } catch (e) { alert("Kamera Error: " + e.message); }
    }

    function switchView(oldId, newId) {
        document.getElementById(oldId).style.display = 'none';
        document.getElementById(newId).style.display = 'block';
    }
</script>
</body>
</html>
