<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absensi Gociko</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root {
            --primary: #FF8C00;
            --danger: #FF4500;
            --light: #FFFFFF;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--danger));
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }
        h2 { color: var(--danger); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1.1rem;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        button:active { transform: scale(0.98); }
        .camera-box {
            width: 100%;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 15px;
            display: none; /* Muncul saat mulai */
            border: 4px solid var(--primary);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #status { font-size: 0.9rem; color: #666; margin-top: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Absensi Gociko</h2>
        
        <div id="view-setup">
            <input type="text" id="input-nik" placeholder="Masukkan NIK Anda" inputmode="numeric">
            <button onclick="initApp()">MULAI ABSENSI</button>
            <p id="status">Silakan masukkan NIK untuk memulai</p>
        </div>
        
        <div id="view-cam" style="display:none;">
            <div class="camera-box" id="box-video" style="display:block;">
                <video id="video" autoplay muted playsinline></video>
            </div>
            <p id="cam-status">Menyiapkan AI Wajah...</p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxqJnXh0H2SqkvlL5JbJNRHjt9nrfSGA3_fM7xQYCObBlLoE1VTerlWdSD0iNM4D01h/exec"; // <--- GANTI INI BRO!

        async function initApp() {
            const nik = document.getElementById('input-nik').value;
            if(!nik) return alert("Wajib isi NIK!");

            // Pindah Tampilan
            document.getElementById('view-setup').style.display = 'none';
            document.getElementById('view-cam').style.display = 'block';
            const statusLabel = document.getElementById('cam-status');

            try {
                // 1. Minta Izin Kamera
                statusLabel.innerText = "Membuka Kamera...";
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                document.getElementById('video').srcObject = stream;

                // 2. Load Model AI
                statusLabel.innerText = "Memuat AI Wajah (Tunggu...)";
                const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                
                statusLabel.innerText = "Siap! Dekatkan wajah ke kamera.";
                statusLabel.style.color = "#FF8C00";
            } catch (err) {
                alert("Gagal: " + err.message);
                location.reload();
            }
        }
    </script>
</body>
</html>
